name: Release

# Builds prebuilt binaries for every platform agents commonly run on and
# attaches them to a GitHub Release. Trigger by pushing a v* tag, or run
# manually (workflow_dispatch) to dry-run the build matrix without releasing.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Test
        run: cargo test --target ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          version="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then version="dry-run"; fi
          name="books-for-bots-${version}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/books-for-bots" LICENSE README.md "$name/"
          tar czf "$name.tar.gz" "$name"
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          if ("${env:GITHUB_EVENT_NAME}" -eq "workflow_dispatch") { $version = "dry-run" }
          $name = "books-for-bots-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $name
          Copy-Item "target/${{ matrix.target }}/release/books-for-bots.exe", LICENSE, README.md $name/
          Compress-Archive -Path $name -DestinationPath "$name.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            books-for-bots-*.tar.gz
            books-for-bots-*.zip
          if-no-files-found: error

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum books-for-bots-* > SHA256SUMS
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --generate-notes \
            artifacts/*
